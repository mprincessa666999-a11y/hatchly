name: couple_app
description: "A couple tasks app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  go_router: ^14.2.0
  uuid: ^4.4.0
  intl: ^0.19.0
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.0.0
  url_launcher: ^6.2.4
  http: ^1.2.1
  path_provider: ^2.1.2
  flutter_local_notifications: ^17.2.2
  flutter_timezone: ^5.0.2
  timezone: ^0.9.4
  flutter_svg: ^2.0.10+1
  model_viewer_plus: ^1.7.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  google_sign_in: ^6.2.1
  speech_to_text: ^7.0.0
  flutter_inappwebview: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/categories/
    - assets/models/chunya/
    - assets/pets/